<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>canvas measureText emoji width bug</title></head>
<body>
<pre id="out"></pre>
<script>
// canvas measureText() returns inflated widths for emoji at font sizes <24px.
// DOM renders emoji at exactly the font size (emoji width = fontSize).
// canvas adds 2-5px depending on size. Converges at >=24px.
// Same result with OffscreenCanvas. Same for all emoji. All font families.

const ctx = document.createElement('canvas').getContext('2d');
const el = document.createElement('span');
el.style.cssText = 'position:absolute;top:-9999px;display:inline-block;white-space:nowrap';
document.body.appendChild(el);

let out = 'fontSize  canvas  DOM     diff\n';
for (const sz of [10,12,14,15,16,18,20,24,28,32]) {
  const font = sz + 'px sans-serif';
  ctx.font = font;
  el.style.font = font;
  el.textContent = '😀';
  const canvasW = ctx.measureText('😀').width;
  const domW = el.getBoundingClientRect().width;
  const diff = canvasW - domW;
  out += `${String(sz).padStart(4)}px    ${canvasW.toFixed(1).padStart(5)}   ${domW.toFixed(1).padStart(5)}   ${diff >= 0 ? '+' : ''}${diff.toFixed(1)}\n`;
}
document.getElementById('out').textContent = out;
</script>
</body>
</html>
